name: kitchensync
description: "KitchenSync — household kitchen management."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.4.1
  cloud_firestore: ^5.4.1
  firebase_auth: ^5.2.1
  firebase_storage: ^12.3.0
  firebase_crashlytics: ^4.1.0
  firebase_analytics: ^11.3.0
  firebase_app_check: ^0.3.1

  # Routing
  go_router: ^14.2.7

  # Images
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # Utilities
  uuid: ^4.5.0
  collection: ^1.18.0
  intl: ^0.19.0
  logger: ^2.4.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13
  very_good_analysis: ^6.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.1
  firebase_storage_mocks: ^0.7.0
  golden_toolkit: ^0.15.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  # analyzer_plugin 0.12.x is broken against analyzer 7.x (Element/Element2 API
  # split). 0.13.0+ restores compatibility. Remove this override when transitive
  # constraints in riverpod_lint / custom_lint catch up.
  analyzer_plugin: ^0.13.0

flutter:
  uses-material-design: true
