name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Enforce 80% coverage
        run: |
          sudo apt-get install -y lcov
          lcov --summary coverage/lcov.info | tee coverage_summary.txt
          PCT=$(grep -oP 'lines\.\.\.\.\.\.: \K[0-9.]+' coverage_summary.txt)
          PCT_INT=${PCT%.*}
          if [ "$PCT_INT" -lt 80 ]; then
            echo "Coverage $PCT% < 80%" >&2
            exit 1
          fi

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify Firebase config and rollout gates
        run: node tools/verify-firebase-gates.mjs && node tools/firebase-gates/test-gates.mjs
      - name: Install Functions dependencies
        run: npm --prefix functions ci
      - name: Lint Functions
        run: npm --prefix functions run lint
      - name: Build Functions
        run: npm --prefix functions run build
      - name: Test Functions
        run: npm --prefix functions test
      - name: Install rules-tests deps
        working-directory: tools/rules_tests
        run: npm ci
      - name: Run rules tests
        working-directory: tools/rules_tests
        run: npm test
      - name: Run Functions emulator tests
        run: tools/firebase-gates/firebase.sh --config firebase.dev.json emulators:exec --only auth,firestore,functions,storage --project kitchensync-dev-da503 "npm --prefix functions run test:emulator"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: npm --prefix functions ci
      - name: Run signed-in callable gate on an owned Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: tools/firebase-gates/run-flutter-callable-android.sh emulator-5554
